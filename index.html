<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semainier — Salle de sport</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2e2e2e;
    --accent: #d4f13a;
    --accent-dim: rgba(212,241,58,0.12);
    --text: #f0f0f0;
    --text-muted: #777;
    --text-dim: #444;
    --danger: #ff4d4d;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .week-info {
    font-size: 13px;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
  }

  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { border-color: #555; color: var(--text); }
  .btn-accent {
    background: var(--accent);
    color: #0f0f0f;
    border-color: var(--accent);
    font-weight: 600;
  }
  .btn-accent:hover { background: #c8e535; border-color: #c8e535; color: #0f0f0f; }
  .btn-danger { border-color: #3a1a1a; color: #ff6b6b; }
  .btn-danger:hover { background: #2a1010; border-color: var(--danger); }

  .board {
    display: grid;
    grid-template-columns: repeat(7, minmax(130px, 1fr));
    gap: 8px;
    padding: 1.2rem;
    overflow-x: auto;
    min-height: calc(100vh - 70px);
    align-items: start;
  }

  @media (max-width: 900px) {
    .board { grid-template-columns: repeat(4, minmax(140px, 1fr)); }
  }
  @media (max-width: 600px) {
    .board { grid-template-columns: repeat(2, 1fr); }
  }

  .col {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .col-header {
    padding: 10px 12px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .col-header.today {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .today-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
  }

  .cards { padding: 8px; min-height: 50px; }

  .card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 9px 10px;
    margin-bottom: 6px;
    cursor: grab;
    transition: border-color 0.15s, opacity 0.2s;
    position: relative;
    user-select: none;
  }
  .card:active { cursor: grabbing; }
  .card.done {
    opacity: 0.45;
    border-left-color: #444 !important;
  }
  .card.done .card-title { text-decoration: line-through; color: var(--text-dim); }
  .card.dragging { opacity: 0.3; }
  .card.drag-target { border-color: var(--accent); }

  .card-top { display: flex; align-items: flex-start; gap: 7px; }

  .check-box {
    width: 16px;
    height: 16px;
    min-width: 16px;
    border-radius: 4px;
    border: 1.5px solid var(--border);
    background: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .check-box:hover { border-color: var(--accent); }
  .check-box.checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .check-box.checked::after {
    content: '';
    display: block;
    width: 9px;
    height: 5px;
    border-left: 2px solid #0f0f0f;
    border-bottom: 2px solid #0f0f0f;
    transform: rotate(-45deg) translateY(-1px);
  }

  .card-body { flex: 1; min-width: 0; }
  .card-title { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-time { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .card-coach { font-size: 11px; color: var(--text-dim); margin-top: 1px; }

  .card-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; position: absolute; top: 6px; right: 6px; }
  .card:hover .card-actions { opacity: 1; }
  .card-btn { background: none; border: none; cursor: pointer; padding: 2px 4px; border-radius: 4px; font-size: 13px; color: var(--text-dim); line-height: 1; }
  .card-btn:hover { color: var(--text); background: var(--border); }
  .card-btn.del:hover { color: var(--danger); }

  .add-btn {
    width: 100%;
    background: none;
    border: 1px dashed var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    padding: 6px;
    cursor: pointer;
    margin-top: 2px;
    transition: all 0.15s;
  }
  .add-btn:hover { border-color: var(--accent); color: var(--accent); }

  .col.drag-over .cards {
    outline: 2px dashed var(--accent);
    outline-offset: 2px;
    border-radius: 6px;
  }

  /* Progress bar */
  .progress-bar {
    height: 3px;
    background: var(--border);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s;
    border-radius: 0 2px 2px 0;
  }

  /* Modal */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem;
    width: 100%;
    max-width: 340px;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 1.2rem; color: var(--text); }

  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; color: var(--text-muted); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 5px; }
  .field input, .field select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field select option { background: var(--surface2); }

  .color-picker { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .color-swatch {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.active { border-color: var(--text); transform: scale(1.1); }

  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.5rem; }

  /* Confirm dialog */
  .confirm-modal { max-width: 280px; text-align: center; }
  .confirm-modal p { font-size: 14px; color: var(--text-muted); margin-bottom: 1.2rem; line-height: 1.5; }

  /* Stats footer */
  .footer {
    padding: 0.6rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-dim);
    flex-wrap: wrap;
  }
  .stat { color: var(--text-muted); }
  .stat span { color: var(--accent); font-weight: 600; }
</style>
</head>
<body>

<header>
  <div class="logo">SALLE DE SPORT</div>
  <div class="week-info" id="week-label">Semaine —</div>
  <div class="header-actions">
    <button class="btn btn-accent" onclick="openModal(0)">+ Nouveau cours</button>
    <button class="btn" onclick="confirmAction('reset')">↺ Reset semaine</button>
    <button class="btn btn-danger" onclick="confirmAction('clear')">Tout effacer</button>
  </div>
</header>

<div class="board" id="board"></div>

<div class="footer" id="footer">
  <span class="stat">Cours cette semaine : <span id="stat-total">0</span></span>
  <span class="stat">Complétés : <span id="stat-done">0</span></span>
  <span class="stat" id="stat-pct"></span>
</div>

<!-- Modal ajout/édition -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <h3 id="modal-title">Ajouter un cours</h3>
    <div class="field">
      <label>Nom du cours</label>
      <input id="inp-name" type="text" placeholder="ex : Yoga, Boxe, Cardio..." />
    </div>
    <div class="field">
      <label>Horaire</label>
      <input id="inp-time" type="text" placeholder="ex : 09h00 – 10h00" />
    </div>
    <div class="field">
      <label>Coach</label>
      <input id="inp-coach" type="text" placeholder="ex : Marie" />
    </div>
    <div class="field">
      <label>Jour</label>
      <select id="inp-day"></select>
    </div>
    <div class="field">
      <label>Couleur</label>
      <div class="color-picker" id="color-picker"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn btn-accent" onclick="saveCard()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Modal confirmation -->
<div class="overlay" id="confirm-overlay" onclick="closeConfirm()">
  <div class="modal confirm-modal" onclick="event.stopPropagation()">
    <h3 id="confirm-title">Confirmer</h3>
    <p id="confirm-msg"></p>
    <div class="modal-footer" style="justify-content:center;">
      <button class="btn" onclick="closeConfirm()">Annuler</button>
      <button class="btn btn-danger" id="confirm-ok" onclick="executeConfirm()">Confirmer</button>
    </div>
  </div>
</div>

<script>
const DAYS = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
const COLORS = ['#d4f13a','#38bdf8','#f97316','#e879f9','#34d399','#fb7185','#a78bfa'];
const KEY = 'gymweek_v3';

let state = { template: {}, week: {}, checks: {}, savedWeek: '' };
let editId = null;
let selColor = COLORS[0];
let dragSrc = null;
let pendingAction = null;

function getWeekId() {
  const d = new Date();
  const thu = new Date(d); thu.setDate(d.getDate() - ((d.getDay()+6)%7) + 3);
  const jan1 = new Date(thu.getFullYear(), 0, 1);
  return thu.getFullYear() + '-W' + String(Math.round((thu - jan1) / 604800000) + 1).padStart(2,'0');
}

function getWeekLabel() {
  const d = new Date();
  const day = d.getDay();
  const mon = new Date(d); mon.setDate(d.getDate() - ((day+6)%7));
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  return mon.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}) + ' – ' + sun.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});
}

function todayIndex() {
  const d = new Date().getDay();
  return d === 0 ? 6 : d - 1;
}

function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) state = JSON.parse(raw);
  } catch(e) {}

  const wid = getWeekId();
  if (state.savedWeek !== wid) {
    state.week = JSON.parse(JSON.stringify(state.template || {}));
    state.checks = {};
    state.savedWeek = wid;
    save();
  }
  render();
}

function save() {
  state.template = JSON.parse(JSON.stringify(state.week));
  localStorage.setItem(KEY, JSON.stringify(state));
}

function render() {
  document.getElementById('week-label').textContent = 'Semaine du ' + getWeekLabel();
  const board = document.getElementById('board');
  board.innerHTML = '';

  const daySelect = document.getElementById('inp-day');
  daySelect.innerHTML = DAYS.map((d,i) => `<option value="${i}">${d}</option>`).join('');

  let totalCards = 0, doneCards = 0;

  DAYS.forEach((day, di) => {
    const cards = state.week[di] || [];
    totalCards += cards.length;

    const isToday = di === todayIndex();
    const doneCnt = cards.filter((_,ci) => state.checks[`${di}-${ci}`]).length;
    doneCards += doneCnt;

    const col = document.createElement('div');
    col.className = 'col';
    col.dataset.di = di;

    const pct = cards.length ? Math.round(doneCnt/cards.length*100) : 0;

    col.innerHTML = `
      <div class="col-header ${isToday?'today':''}">
        ${day} ${isToday ? '<span class="today-dot"></span>' : ''}
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="cards" id="cards-${di}"></div>
    `;
    board.appendChild(col);

    const cardsEl = col.querySelector('.cards');
    cardsEl.addEventListener('dragover', e => { e.preventDefault(); col.classList.add('drag-over'); });
    cardsEl.addEventListener('dragleave', () => col.classList.remove('drag-over'));
    cardsEl.addEventListener('drop', e => { e.preventDefault(); col.classList.remove('drag-over'); dropCard(di); });

    cards.forEach((card, ci) => {
      const isDone = !!state.checks[`${di}-${ci}`];
      const el = document.createElement('div');
      el.className = 'card' + (isDone ? ' done' : '');
      el.draggable = true;
      el.style.borderLeftColor = card.color || COLORS[0];
      el.innerHTML = `
        <div class="card-top">
          <div class="check-box ${isDone?'checked':''}" onclick="toggleCheck(${di},${ci})"></div>
          <div class="card-body">
            <div class="card-title">${card.name}</div>
            ${card.time ? `<div class="card-time">${card.time}</div>` : ''}
            ${card.coach ? `<div class="card-coach">Coach : ${card.coach}</div>` : ''}
          </div>
        </div>
        <div class="card-actions">
          <button class="card-btn" onclick="openEdit(${di},${ci})" title="Modifier">✎</button>
          <button class="card-btn del" onclick="deleteCard(${di},${ci})" title="Supprimer">×</button>
        </div>
      `;
      el.addEventListener('dragstart', () => { dragSrc = {di, ci}; el.classList.add('dragging'); });
      el.addEventListener('dragend', () => el.classList.remove('dragging'));
      cardsEl.appendChild(el);
    });

    const addBtn = document.createElement('button');
    addBtn.className = 'add-btn';
    addBtn.textContent = '+ ajouter';
    addBtn.onclick = () => openModal(di);
    col.appendChild(addBtn);
  });

  document.getElementById('stat-total').textContent = totalCards;
  document.getElementById('stat-done').textContent = doneCards;
  const pctTotal = totalCards ? Math.round(doneCards/totalCards*100) : 0;
  document.getElementById('stat-pct').textContent = totalCards ? `Progression : ${pctTotal}%` : '';
}

function toggleCheck(di, ci) {
  const key = `${di}-${ci}`;
  state.checks[key] = !state.checks[key];
  save(); render();
}

function dropCard(targetDi) {
  if (!dragSrc) return;
  const {di, ci} = dragSrc;
  const card = (state.week[di] || []).splice(ci, 1)[0];
  if (!state.week[targetDi]) state.week[targetDi] = [];
  state.week[targetDi].push(card);
  dragSrc = null;
  save(); render();
}

function openModal(di) {
  editId = null;
  document.getElementById('modal-title').textContent = 'Ajouter un cours';
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-time').value = '';
  document.getElementById('inp-coach').value = '';
  document.getElementById('inp-day').value = di;
  selColor = COLORS[0];
  renderColors();
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('inp-name').focus(), 100);
}

function openEdit(di, ci) {
  const card = state.week[di][ci];
  editId = {di, ci};
  document.getElementById('modal-title').textContent = 'Modifier le cours';
  document.getElementById('inp-name').value = card.name;
  document.getElementById('inp-time').value = card.time || '';
  document.getElementById('inp-coach').value = card.coach || '';
  document.getElementById('inp-day').value = di;
  selColor = card.color || COLORS[0];
  renderColors();
  document.getElementById('overlay').classList.add('open');
}

function renderColors() {
  document.getElementById('color-picker').innerHTML = COLORS.map(c =>
    `<div class="color-swatch ${c===selColor?'active':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`
  ).join('');
}

function pickColor(c) { selColor = c; renderColors(); }

function closeModal() { document.getElementById('overlay').classList.remove('open'); }

function handleOverlayClick(e) { if (e.target.id === 'overlay') closeModal(); }

function saveCard() {
  const name = document.getElementById('inp-name').value.trim();
  if (!name) { document.getElementById('inp-name').focus(); return; }
  const di = parseInt(document.getElementById('inp-day').value);
  const card = {
    name,
    time: document.getElementById('inp-time').value.trim(),
    coach: document.getElementById('inp-coach').value.trim(),
    color: selColor
  };
  if (!state.week[di]) state.week[di] = [];
  if (editId) {
    const oldDi = editId.di;
    state.week[oldDi].splice(editId.ci, 1);
    state.week[di].push(card);
  } else {
    state.week[di].push(card);
  }
  save(); closeModal(); render();
}

function deleteCard(di, ci) {
  state.week[di].splice(ci, 1);
  delete state.checks[`${di}-${ci}`];
  save(); render();
}

function confirmAction(action) {
  pendingAction = action;
  document.getElementById('confirm-overlay').classList.add('open');
  if (action === 'reset') {
    document.getElementById('confirm-title').textContent = 'Reset la semaine';
    document.getElementById('confirm-msg').textContent = 'Les coches seront remises à zéro. Les cours du modèle sont conservés.';
  } else {
    document.getElementById('confirm-title').textContent = 'Tout effacer';
    document.getElementById('confirm-msg').textContent = 'Tous les cours seront supprimés définitivement.';
  }
}

function closeConfirm() { document.getElementById('confirm-overlay').classList.remove('open'); pendingAction = null; }

function executeConfirm() {
  if (pendingAction === 'reset') {
    state.checks = {};
    state.week = JSON.parse(JSON.stringify(state.template));
  } else {
    state.week = {}; state.template = {}; state.checks = {};
  }
  save(); closeConfirm(); render();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeConfirm(); } });

load();
</script>
</body>
</html>
